<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI Work Alignment Check</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#4c0519] text-white font-sans">

<div id="app" class="min-h-screen flex flex-col items-center justify-center p-6"></div>

<script>
let state = {
  started: false,
  step: 0,
  answers: {
    ai: [],
    workflow: [],
    system: [],
    impact: []
  }
};

const steps = [
  {
    title: "AI 工具",
    key: "ai",
    items: ["ChatGPT","Claude","Gemini","Copilot","Notion AI"]
  },
  {
    title: "工作流",
    key: "workflow",
    items: ["Slack","Email","Excel","Meeting","Copy paste"]
  },
  {
    title: "工作系統",
    key: "system",
    items: [
      {label:"單一系統",px:80},
      {label:"跨工具",px:60},
      {label:"沒流程",px:-80}
    ]
  },
  {
    title: "決策依據",
    key: "impact",
    items: [
      {label:"數據",px:80},
      {label:"經驗",px:-80}
    ]
  }
];

function render() {
  const app = document.getElementById("app");

  if (!state.started) {
    app.innerHTML = `
      <h1 class="text-4xl font-bold mb-6">AI Work Alignment Check</h1>
      <button onclick="start()" class="px-6 py-3 bg-white text-black rounded-xl">
        Start
      </button>
    `;
    return;
  }

  if (state.step < steps.length) {
    const step = steps[state.step];

    app.innerHTML = `
      <div class="max-w-md w-full">
        <h2 class="text-xl mb-4">${step.title}</h2>

        <div class="space-y-2">
          ${step.items.map((item,i)=>`
            <button onclick="toggle('${step.key}',${i})"
              class="w-full px-4 py-3 rounded-xl border ${
                state.answers[step.key].includes(i)
                ? 'bg-white text-black'
                : 'bg-transparent'
              }">
              ${typeof item === 'string' ? item : item.label}
            </button>
          `).join("")}
        </div>

        <button onclick="next()" class="mt-6 px-6 py-3 bg-pink-500 rounded-xl w-full">
          Next
        </button>
      </div>
    `;
    return;
  }

  // RESULT
  const result = getResult();

  app.innerHTML = `
    <div class="text-center space-y-6">
      <h2 class="text-3xl font-bold">${result.title}</h2>
      <p class="opacity-80">${result.desc}</p>

      <button onclick="restart()" class="px-6 py-3 bg-white text-black rounded-xl">
        Restart
      </button>
    </div>
  `;
}

function start() {
  state.started = true;
  render();
}

function toggle(key, index) {
  const arr = state.answers[key];
  if (arr.includes(index)) {
    state.answers[key] = arr.filter(i=>i!==index);
  } else {
    arr.push(index);
  }
  render();
}

function next() {
  state.step++;
  render();
}

function restart() {
  state = {
    started:false,
    step:0,
    answers:{ai:[],workflow:[],system:[],impact:[]}
  };
  render();
}

function getResult() {
  let score = 0;

  state.answers.system.forEach(i=>{
    const item = steps[2].items[i];
    score += item.px;
  });

  if (score > 50) {
    return {
      title: "AI Driven Growth",
      desc: "你已經進入高成熟度"
    };
  } else {
    return {
      title: "Operational Chaos",
      desc: "目前流程仍然混亂"
    };
  }
}

render();
</script>

</body>
</html>
